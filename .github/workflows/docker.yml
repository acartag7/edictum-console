name: Docker

on:
  push:
    branches: [master]
    tags: ["v*"]
  pull_request:
    branches: [master]

permissions:
  contents: read
  packages: write
  security-events: write

jobs:
  build:
    name: Docker Build
    runs-on: ubuntu-latest
    # Run on pushes to master and PRs, but not on tag pushes (publish handles those)
    if: startsWith(github.ref, 'refs/tags/') == false
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          load: true
          tags: edictum-console:test
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Trivy vulnerability scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: edictum-console:test
          format: table
          exit-code: 1
          severity: CRITICAL,HIGH
          ignore-unfixed: true

      - name: Trivy misconfiguration scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: .
          scanners: misconfig
          format: table
          exit-code: 1
          severity: CRITICAL,HIGH

  publish:
    name: Publish to GHCR
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-qemu-action@v3

      - uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      # Build single-platform first for Trivy scan, then push multi-platform
      - name: Build for scan
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          load: true
          tags: edictum-console:scan
          cache-from: type=gha

      - name: Trivy vulnerability scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: edictum-console:scan
          format: table
          exit-code: 1
          severity: CRITICAL,HIGH
          ignore-unfixed: true

      - name: Trivy SARIF report
        uses: aquasecurity/trivy-action@master
        if: always()
        with:
          image-ref: edictum-console:scan
          format: sarif
          output: trivy-results.sarif
          severity: CRITICAL,HIGH
          ignore-unfixed: true

      - name: Upload Trivy SARIF to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-results.sarif

      - name: Push multi-platform image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ghcr.io/acartag7/edictum-console:${{ steps.version.outputs.version }}
            ghcr.io/acartag7/edictum-console:latest
          labels: |
            org.opencontainers.image.source=https://github.com/acartag7/edictum-console
            org.opencontainers.image.description=Self-hostable agent operations console for edictum
            org.opencontainers.image.licenses=AGPL-3.0-only
          cache-from: type=gha
          cache-to: type=gha,mode=max
