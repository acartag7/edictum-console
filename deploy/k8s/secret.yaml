# Edictum Console — Kubernetes Secret
#
# IMPORTANT: Replace ALL placeholder values below before applying.
# Generate secrets with: python -c "import secrets; print(secrets.token_hex(32))"
# Then base64-encode:    echo -n 'your-value' | base64
#
# This file should NOT be committed with real values. Use a secret manager
# (Sealed Secrets, SOPS, Vault) in any shared environment.
apiVersion: v1
kind: Secret
metadata:
  name: edictum-console
  namespace: edictum
  labels:
    app.kubernetes.io/name: edictum-console
    app.kubernetes.io/part-of: edictum-console
type: Opaque
data:
  # -- Required secrets (base64-encoded) --
  # echo -n 'your-postgres-password' | base64
  POSTGRES_PASSWORD: "REPLACE_BASE64_POSTGRES_PASSWORD"
  # echo -n 'your-64-char-hex-secret' | base64
  EDICTUM_SECRET_KEY: "REPLACE_BASE64_SECRET_KEY"
  # echo -n 'your-64-char-hex-secret' | base64
  EDICTUM_SIGNING_KEY_SECRET: "REPLACE_BASE64_SIGNING_KEY_SECRET"
  # -- Admin bootstrap (optional, first run only) --
  # echo -n 'admin@example.com' | base64
  EDICTUM_ADMIN_EMAIL: ""
  # echo -n 'your-admin-password' | base64
  EDICTUM_ADMIN_PASSWORD: ""
